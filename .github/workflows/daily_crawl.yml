name: Daily Crawl

on:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 22 * * *'
    - cron: '0 23 * * *'
    - cron: '30 23 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_HEADLESS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright boto3 requests

      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run crawler
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scramer_merge.py

      - name: Sync frontend calendar data
        run: |
          mkdir -p frontend/data
          cp data/Asharecalendar_data.json frontend/data/Asharecalendar_data.json
          cp data/bondcalendar_data.json frontend/data/bondcalendar_data.json
          cp data/Hsharecalendar_data.json frontend/data/Hsharecalendar_data.json
          cp data/calendar_data.json frontend/data/calendar_data.json
          cp data/trading_holidays.json frontend/data/trading_holidays.json

      - name: Sync unlock db
        id: sync_unlock_db
        continue-on-error: true
        run: python sync_unlock_db.py

      - name: Commit generated frontend data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/unlock_db.js frontend/data/*.json
          if git diff --cached --quiet; then
            echo "No frontend data changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh frontend calendar data"
          git push
