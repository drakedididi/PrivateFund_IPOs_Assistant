name: Daily Crawl

on:
  push:
    branches:
      - main

  schedule:
    - cron: '0 21 * * *'
    - cron: '0 22 * * *'
    - cron: '0 23 * * *'
    - cron: '30 23 * * *'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_HEADLESS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright boto3 requests

      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run crawler
        run: python scramer_merge.py

      - name: Sync frontend calendar data
        run: |
          mkdir -p frontend/data
          cp data/Asharecalendar_data.json frontend/data/Asharecalendar_data.json
          cp data/bondcalendar_data.json frontend/data/bondcalendar_data.json
          cp data/Hsharecalendar_data.json frontend/data/Hsharecalendar_data.json
          cp data/calendar_data.json frontend/data/calendar_data.json
          cp data/trading_holidays.json frontend/data/trading_holidays.json

      - name: Sync unlock db
        id: sync_unlock_db
        continue-on-error: true
        run: python sync_unlock_db.py

      - name: Build Pages artifact
        run: |
          mkdir -p dist
          cp -r frontend dist/frontend
          cp index.html dist/index.html
          cp IPO.html dist/IPO.html
          cp module_tools.html dist/module_tools.html
          cp trade_tools.html dist/trade_tools.html

      - name: Deploy generated site to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=fundsassistant --branch=main --commit-dirty=true --commit-message="Automated calendar deploy"
